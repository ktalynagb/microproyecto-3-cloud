      - azure-identity>=1.25.3
      # AWS (si lo necesitas)
      - boto3>=1.42.75
      - sagemaker>=3.6.0
      # ML Tracking
      - mlflow
      - azureml-mlflow
      # Web/API (si corre en este cluster)
      - streamlit>=1.45.0
      - fastapi>=0.115.0
      - uvicorn>=0.34.0
      - python-multipart>=0.0.20
      - requests>=2.32.0
      # Config
      - python-dotenv>=1.0.0