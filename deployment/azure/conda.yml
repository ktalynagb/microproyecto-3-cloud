name: pcb-azure-env-v2
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip:
      # Hugging Face
      - datasets>=2.14.0
      - huggingface-hub>=1.7.2
      # Visión Artificial
      - ultralytics>=8.3.0
      - opencv-python-headless>=4.10.0
      - Pillow>=11.2.1
      # Datos
      - pandas>=2.2.3
      - reportlab>=4.2.0
      # Cloud Azure
