version: "3.9"

# ── Desarrollo local ─────────────────────────────────────────────────────────
# Uso:
#   cd deployment/azure
#   docker-compose up --build
#
# El frontend se conecta al backend en http://localhost:8080
# Copia .env.example → .env y rellena las variables antes de arrancar.
#
# Autenticación local: las credenciales de Azure CLI (~/.azure) se montan en
# modo solo-lectura para que el backend obtenga tokens automáticamente.
# Asegúrate de haber ejecutado `az login` antes de levantar los contenedores.

services:

  # ── Backend FastAPI ──────────────────────────────────────────────────────
  backend:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: pcb-backend:dev
    container_name: pcb-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - LOG_LEVEL=INFO
    # Montar credenciales de Azure CLI para desarrollo local.
    # En Azure Container Instances se usa Managed Identity (sin este mount).
    volumes:
      - ${HOME}/.azure:/home/appuser/.azure:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend Streamlit ───────────────────────────────────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: pcb-frontend:dev
    container_name: pcb-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - AZURE_BACKEND_URL=http://backend:8080
      - API_HOST=backend
      - API_PORT=8080
      - API_TIMEOUT=60
    depends_on:
      backend:
        condition: service_healthy
