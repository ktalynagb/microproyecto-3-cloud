version: "3.9"

# ── Desarrollo local ─────────────────────────────────────────────────────────
# Uso:
#   cd deployment/azure
#   docker-compose up --build
#
# El frontend se conecta al backend en http://localhost:8080
# Copia .env.example → .env y rellena las variables antes de arrancar.
#
# Autenticación local: las credenciales de Azure CLI (~/.azure) se montan en
# modo solo-lectura para que el backend obtenga tokens automáticamente.
# Asegúrate de haber ejecutado `az login` antes de levantar los contenedores.

services:
  pcb-backend:
    build:
      context: ../../
      dockerfile: deployment/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - BACKEND_API_KEY=pcb-api-key-super-secreto
      - API_PORT=8080
      - LOG_LEVEL=INFO
    # Montar credenciales de Azure CLI para desarrollo local.
    # En Azure Container Instances se usa Managed Identity (sin este mount).
    volumes:
      - ${HOME}/.azure:/home/appuser/.azure:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  pcb-frontend:
    build:
      context: ../../
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - AZURE_BACKEND_URL=http://pcb-backend:8080
      - API_HOST=0.0.0.0
      - API_PORT=8501
      - API_TIMEOUT=30
    depends_on:
      backend:
        condition: service_healthy
